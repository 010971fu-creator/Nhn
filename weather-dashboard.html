<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الطقس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .weather-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .temp-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
        }
        .weather-icon {
            font-size: 4rem;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold text-white mb-2">
                <i class="fas fa-cloud-sun"></i> لوحة تحكم الطقس
            </h1>
            <p class="text-white text-opacity-80">احصل على تنبؤات الطقس في الوقت الفعلي</p>
        </div>

        <!-- Search Bar -->
        <div class="max-w-2xl mx-auto mb-8">
            <div class="flex gap-2">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="ابحث عن مدينة..." 
                    class="flex-1 px-6 py-3 rounded-lg text-right focus:outline-none focus:ring-2 focus:ring-white"
                >
                <button 
                    id="searchBtn" 
                    class="bg-white text-purple-600 px-8 py-3 rounded-lg font-bold hover:bg-opacity-90 transition"
                >
                    <i class="fas fa-search"></i> بحث
                </button>
                <button 
                    id="locationBtn" 
                    class="bg-blue-500 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-600 transition"
                    title="استخدم موقعك الحالي"
                >
                    <i class="fas fa-location-dot"></i>
                </button>
            </div>
        </div>

        <!-- Main Weather Card -->
        <div class="max-w-2xl mx-auto mb-8">
            <div class="weather-card rounded-3xl p-8 text-white" id="mainWeather">
                <div class="text-center">
                    <div class="loader mx-auto"></div>
                    <p class="mt-4">جاري التحميل...</p>
                </div>
            </div>
        </div>

        <!-- Forecast Cards -->
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl font-bold text-white mb-6">التنبؤ لمدة 5 أيام</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4" id="forecastContainer">
                <!-- Forecast cards will be populated here -->
            </div>
        </div>

        <!-- Weather Details Grid -->
        <div class="max-w-6xl mx-auto mt-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="detailsContainer">
                <!-- Weather details will be populated here -->
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="hidden max-w-2xl mx-auto bg-red-500 text-white p-4 rounded-lg text-center mt-4"></div>
    </div>

    <script>
        const API_KEY = 'b6fd43b59e2cc2a95a0e558db82c9813'; // OpenWeatherMap API Key
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const locationBtn = document.getElementById('locationBtn');
        const mainWeather = document.getElementById('mainWeather');
        const forecastContainer = document.getElementById('forecastContainer');
        const detailsContainer = document.getElementById('detailsContainer');
        const errorMsg = document.getElementById('errorMsg');

        // Weather icons mapping
        const weatherIcons = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '☁️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌧️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        // Get weather by city name
        async function getWeatherByCity(city) {
            try {
                hideError();
                showLoading();
                
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=ar`
                );
                
                if (!response.ok) {
                    throw new Error('المدينة غير موجودة');
                }
                
                const data = await response.json();
                displayCurrentWeather(data);
                getWeatherForecast(data.coord.lat, data.coord.lon);
            } catch (error) {
                showError(error.message);
            }
        }

        // Get weather by coordinates
        async function getWeatherByCoords(lat, lon) {
            try {
                hideError();
                showLoading();
                
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=ar`
                );
                
                if (!response.ok) {
                    throw new Error('لم يتمكن من الوصول إلى الطقس');
                }
                
                const data = await response.json();
                displayCurrentWeather(data);
                getWeatherForecast(lat, lon);
            } catch (error) {
                showError(error.message);
            }
        }

        // Get 5-day forecast
        async function getWeatherForecast(lat, lon) {
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=ar`
                );
                
                const data = await response.json();
                displayForecast(data.list);
            } catch (error) {
                showError('خطأ في جلب التنبؤات');
            }
        }

        // Display current weather
        function displayCurrentWeather(data) {
            const icon = weatherIcons[data.weather[0].icon] || '🌤️';
            const temp = Math.round(data.main.temp);
            const feelsLike = Math.round(data.main.feels_like);
            const humidity = data.main.humidity;
            const windSpeed = Math.round(data.wind.speed * 3.6); // Convert m/s to km/h
            const pressure = data.main.pressure;
            const visibility = Math.round(data.visibility / 1000);
            const description = data.weather[0].description;
            const sunrise = new Date(data.sys.sunrise * 1000).toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            const sunset = new Date(data.sys.sunset * 1000).toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });

            mainWeather.innerHTML = `
                <div class="text-center">
                    <h2 class="text-4xl font-bold mb-2">${data.name}, ${data.sys.country}</h2>
                    <p class="text-xl text-white text-opacity-80 mb-6">آخر تحديث: ${new Date().toLocaleTimeString('ar-SA')}</p>
                    
                    <div class="flex justify-center items-center mb-6">
                        <div class="weather-icon">${icon}</div>
                    </div>
                    
                    <div class="temp-display">${temp}°C</div>
                    <p class="text-2xl mb-6 capitalize">${description}</p>
                    <p class="text-lg text-white text-opacity-80">الإحساس: ${feelsLike}°C</p>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8">
                    <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                        <p class="text-white text-opacity-70 text-sm">الرطوبة</p>
                        <p class="text-2xl font-bold">${humidity}%</p>
                    </div>
                    <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                        <p class="text-white text-opacity-70 text-sm">الريح</p>
                        <p class="text-2xl font-bold">${windSpeed} كم/س</p>
                    </div>
                    <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                        <p class="text-white text-opacity-70 text-sm">الضغط</p>
                        <p class="text-2xl font-bold">${pressure} hPa</p>
                    </div>
                    <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                        <p class="text-white text-opacity-70 text-sm">الرؤية</p>
                        <p class="text-2xl font-bold">${visibility} كم</p>
                    </div>
                    <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                        <p class="text-white text-opacity-70 text-sm">الشروق</p>
                        <p class="text-2xl font-bold">${sunrise}</p>
                    </div>
                    <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                        <p class="text-white text-opacity-70 text-sm">الغروب</p>
                        <p class="text-2xl font-bold">${sunset}</p>
                    </div>
                    <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                        <p class="text-white text-opacity-70 text-sm">درجة صغرى</p>
                        <p class="text-2xl font-bold">${Math.round(data.main.temp_min)}°C</p>
                    </div>
                    <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                        <p class="text-white text-opacity-70 text-sm">درجة كبرى</p>
                        <p class="text-2xl font-bold">${Math.round(data.main.temp_max)}°C</p>
                    </div>
                </div>
            `;
        }

        // Display forecast
        function displayForecast(forecastData) {
            const dailyForecasts = {};
            
            forecastData.forEach(item => {
                const date = new Date(item.dt * 1000).toLocaleDateString('ar-SA');
                if (!dailyForecasts[date]) {
                    dailyForecasts[date] = item;
                }
            });

            forecastContainer.innerHTML = '';
            
            Object.entries(dailyForecasts).slice(0, 5).forEach(([date, data]) => {
                const icon = weatherIcons[data.weather[0].icon] || '🌤️';
                const temp = Math.round(data.main.temp);
                
                const card = document.createElement('div');
                card.className = 'weather-card rounded-2xl p-4 text-white text-center';
                card.innerHTML = `
                    <p class="font-bold mb-2">${date}</p>
                    <div class="text-3xl mb-2">${icon}</div>
                    <p class="text-xl font-bold mb-1">${temp}°C</p>
                    <p class="text-sm text-white text-opacity-80 capitalize">${data.weather[0].description}</p>
                `;
                forecastContainer.appendChild(card);
            });
        }

        // Show error message
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
        }

        // Hide error message
        function hideError() {
            errorMsg.classList.add('hidden');
        }

        // Show loading state
        function showLoading() {
            mainWeather.innerHTML = `
                <div class="text-center">
                    <div class="loader mx-auto"></div>
                    <p class="mt-4 text-white">جاري التحميل...</p>
                </div>
            `;
        }

        // Get user's location
        function getUserLocation() {
            if (navigator.geolocation) {
                showLoading();
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const { latitude, longitude } = position.coords;
                        getWeatherByCoords(latitude, longitude);
                    },
                    error => {
                        showError('لم نتمكن من الوصول إلى موقعك. يرجى التحقق من الأذونات.');
                    }
                );
            } else {
                showError('المتصفح الخاص بك لا يدعم تحديد الموقع');
            }
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            if (cityInput.value.trim()) {
                getWeatherByCity(cityInput.value.trim());
                cityInput.value = '';
            }
        });

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && cityInput.value.trim()) {
                getWeatherByCity(cityInput.value.trim());
                cityInput.value = '';
            }
        });

        locationBtn.addEventListener('click', getUserLocation);

        // Load default city on page load
        window.addEventListener('load', () => {
            getWeatherByCity('الرياض');
        });
    </script>
</body>
</html>
